<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Multi-stop palette mirrors the in-app blob so the favicon and the
         title chip read as the same brand mark. Extra stops keep the colour
         transitions smooth so no single colour band visually dominates. -->
    <linearGradient id="g" x1="0.08" y1="0.08" x2="0.92" y2="0.92">
      <stop offset="0"    stop-color="#FFD76B"/>
      <stop offset="0.18" stop-color="#FF9D4D"/>
      <stop offset="0.38" stop-color="#FF6BB5"/>
      <stop offset="0.58" stop-color="#B06BFF"/>
      <stop offset="0.78" stop-color="#6AA9FF"/>
      <stop offset="1"    stop-color="#4DD9C0"/>
    </linearGradient>
    <radialGradient id="hl" cx="0.36" cy="0.3" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.55" r="0.6">
      <stop offset="0" stop-color="#ff6bb5" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff6bb5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0e1116"/>
  <circle cx="32" cy="34" r="22" fill="url(#glow)"/>
  <!-- Asymmetric blob path: six soft lobes with varying reach to feel organic
       rather than circular. Closed with bezier curves for smooth highlights. -->
  <path d="M48.8 20.6
           C53.4 26.4, 53.1 34.6, 49.9 41.2
           C46.4 48.4, 38.7 52.6, 30.6 51.6
           C22.7 50.7, 14.9 46.5, 12.4 38.5
           C9.7 30.1, 12.6 20.8, 19.6 15.8
           C25.9 11.4, 35.1 11.1, 41.7 14.3
           C44.6 15.7, 47.0 17.8, 48.8 20.6 Z"
        fill="url(#g)"/>
  <path d="M48.8 20.6
           C53.4 26.4, 53.1 34.6, 49.9 41.2
           C46.4 48.4, 38.7 52.6, 30.6 51.6
           C22.7 50.7, 14.9 46.5, 12.4 38.5
           C9.7 30.1, 12.6 20.8, 19.6 15.8
           C25.9 11.4, 35.1 11.1, 41.7 14.3
           C44.6 15.7, 47.0 17.8, 48.8 20.6 Z"
        fill="url(#hl)"/>
</svg>
