<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1116" />
  <title>What Color Are They?</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar" role="banner">
    <h1 class="title">What Color Are They?</h1>
    <div class="scoreboard" aria-live="polite">
      <span class="chip" id="round-chip">Round 1</span>
      <span class="chip" id="streak-chip">Streak 0</span>
      <span class="chip" id="best-chip">Best 0</span>
      <span class="chip chip--guesses" id="guesses-chip">Guesses 3</span>
      <span class="chip chip--skips" id="skips-chip">Skips</span>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Game mode">
    <button id="tab-items" class="tab tab--active" role="tab" aria-selected="true" type="button">Items</button>
    <button id="tab-grid" class="tab" role="tab" aria-selected="false" type="button">Characters</button>
  </nav>

  <main class="stage" id="stage">
    <section class="card" id="character-card" aria-label="Character">
      <figure class="photo" id="photo-frame">
        <img id="character-img" alt="" decoding="async" fetchpriority="high" />
      </figure>
    </section>

    <h2 class="character-title" id="character-name">&nbsp;</h2>

    <!-- Each round shows exactly one of these boards. The grid (4x4 shade
         picker, character round) and quad (4 swatches, item round) are
         mutually exclusive — JS toggles `hidden` based on the round type
         so the player never sees both at once. Both start hidden so the
         first paint doesn't flash an empty board before JS runs. -->
    <section class="board" id="board" hidden aria-label="Color choices">
      <div class="board-corner" aria-hidden="true"></div>
      <div class="col-headers" id="col-headers" aria-hidden="true"></div>
      <div class="row-headers" id="row-headers" aria-hidden="true"></div>
      <div class="grid" id="grid" role="grid" aria-label="4 by 4 color grid"></div>
    </section>

    <section class="quad" id="quad" hidden aria-label="Color choices"></section>

    <section class="status" id="status" aria-live="polite"></section>

    <section class="share" id="share-slot" hidden aria-label="Today's result"></section>

    <p class="countdown" id="countdown" aria-live="polite"></p>

    <div class="actions">
      <button id="skip-btn" class="btn btn--ghost" hidden>Skip</button>
      <button id="next-btn" class="btn btn--primary" hidden>Next round &rarr;</button>
    </div>

    <section class="share-actions" id="share-actions" hidden aria-label="Share options">
      <button id="share-btn" class="btn btn--primary" type="button">Save image</button>
      <button id="link-btn" class="btn" type="button">Copy link</button>
      <button id="copy-btn" class="btn btn--ghost" type="button">Copy emoji</button>
    </section>
  </main>

  <footer class="bottombar">
    <small>A new puzzle every day. Resets at UTC midnight.</small>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
